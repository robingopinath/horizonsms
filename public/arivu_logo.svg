<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <!-- Gradients for Teal Leaves -->
    <linearGradient id="tealLeafGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#1E4F70" />
      <stop offset="50%" stop-color="#2D7F99" />
      <stop offset="100%" stop-color="#46A6C2" />
    </linearGradient>
    
    <!-- Gradients for Green Leaves -->
    <linearGradient id="greenLeafGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#14532D" />
      <stop offset="50%" stop-color="#166534" />
      <stop offset="100%" stop-color="#22C55E" />
    </linearGradient>

    <!-- Gradient for Diya Bowl -->
    <radialGradient id="diyaBowlGrad" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#F97316" />
      <stop offset="70%" stop-color="#EA580C" />
      <stop offset="100%" stop-color="#C2410C" />
    </radialGradient>
    
    <!-- Gradient for Diya Lip -->
    <linearGradient id="diyaLipGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C2410C" />
      <stop offset="50%" stop-color="#EA580C" />
      <stop offset="100%" stop-color="#C2410C" />
    </linearGradient>

    <!-- Gradient for Outer Flame -->
    <linearGradient id="outerFlameGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#D97706" />
      <stop offset="40%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#FDE047" />
    </linearGradient>

    <!-- Gradient for Inner Flame -->
    <linearGradient id="innerFlameGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#DC2626" />
      <stop offset="50%" stop-color="#EA580C" />
      <stop offset="100%" stop-color="#F59E0B" />
    </linearGradient>

    <!-- Shading overlays and shadows -->
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0F172A" flood-opacity="0.1" />
    </filter>
  </defs>

  <!-- Group for the leaves behind -->
  <g id="leaves" filter="url(#dropShadow)">
    <!-- LEFTMOST GREEN LEAF (Angled -65deg) -->
    <g transform="translate(110, 190) rotate(-65)">
      <path d="M 0,0 C -30, -50 -5, -110 0, -130 C 5, -110 30, -50 0,0 Z" fill="url(#greenLeafGrad)" />
      <!-- Central vein -->
      <path d="M 0,0 L 0,-125" stroke="#14532D" stroke-width="2" opacity="0.6" stroke-linecap="round" fill="none" />
      <!-- Side veins -->
      <path d="M 0,-30 C -10,-40 -20,-45 -22,-46 M 0,-30 C 10,-40 20,-45 22,-46" stroke="#14532D" stroke-width="1.5" opacity="0.4" fill="none" />
      <path d="M 0,-60 C -12,-70 -22,-75 -24,-76 M 0,-60 C 12,-70 22,-75 24,-76" stroke="#14532D" stroke-width="1.5" opacity="0.4" fill="none" />
      <path d="M 0,-90 C -10,-100 -18,-103 -19,-104 M 0,-90 C 10,-100 18,-103 19,-104" stroke="#14532D" stroke-width="1.5" opacity="0.4" fill="none" />
      <!-- Water Droplet -->
      <circle cx="-12" cy="-65" r="3.5" fill="#FFFFFF" opacity="0.35" />
      <circle cx="-13" cy="-66" r="1.5" fill="#FFFFFF" opacity="0.7" />
    </g>

    <!-- RIGHTMOST GREEN LEAF (Angled 65deg) -->
    <g transform="translate(290, 190) rotate(65)">
      <path d="M 0,0 C -30, -50 -5, -110 0, -130 C 5, -110 30, -50 0,0 Z" fill="url(#greenLeafGrad)" />
      <!-- Central vein -->
      <path d="M 0,0 L 0,-125" stroke="#14532D" stroke-width="2" opacity="0.6" stroke-linecap="round" fill="none" />
      <!-- Side veins -->
      <path d="M 0,-30 C -10,-40 -20,-45 -22,-46 M 0,-30 C 10,-40 20,-45 22,-46" stroke="#14532D" stroke-width="1.5" opacity="0.4" fill="none" />
      <path d="M 0,-60 C -12,-70 -22,-75 -24,-76 M 0,-60 C 12,-70 22,-75 24,-76" stroke="#14532D" stroke-width="1.5" opacity="0.4" fill="none" />
      <path d="M 0,-90 C -10,-100 -18,-103 -19,-104 M 0,-90 C 10,-100 18,-103 19,-104" stroke="#14532D" stroke-width="1.5" opacity="0.4" fill="none" />
      <!-- Water Droplet -->
      <circle cx="12" cy="-65" r="3.5" fill="#FFFFFF" opacity="0.35" />
      <circle cx="11" cy="-66" r="1.5" fill="#FFFFFF" opacity="0.7" />
    </g>

    <!-- LEFT TEAL LEAF (Angled -30deg) -->
    <g transform="translate(150, 170) rotate(-30)">
      <path d="M 0,0 C -40, -60 -10, -130 0, -155 C 10, -130 40, -60 0,0 Z" fill="url(#tealLeafGrad)" />
      <!-- Central vein -->
      <path d="M 0,0 L 0,-150" stroke="#1E4F70" stroke-width="2" opacity="0.6" stroke-linecap="round" fill="none" />
      <!-- Side veins -->
      <path d="M 0,-35 C -15,-45 -25,-52 -28,-54 M 0,-35 C 15,-45 25,-52 28,-54" stroke="#1E4F70" stroke-width="1.5" opacity="0.4" fill="none" />
      <path d="M 0,-70 C -18,-82 -28,-88 -30,-89 M 0,-70 C 18,-82 28,-88 30,-89" stroke="#1E4F70" stroke-width="1.5" opacity="0.4" fill="none" />
      <path d="M 0,-105 C -15,-118 -22,-121 -24,-122 M 0,-105 C 15,-118 22,-121 24,-122" stroke="#1E4F70" stroke-width="1.5" opacity="0.4" fill="none" />
      <!-- Water Droplet -->
      <circle cx="-14" cy="-80" r="4" fill="#FFFFFF" opacity="0.35" />
      <circle cx="-15" cy="-81" r="1.8" fill="#FFFFFF" opacity="0.7" />
    </g>

    <!-- RIGHT TEAL LEAF (Angled 30deg) -->
    <g transform="translate(250, 170) rotate(30)">
      <path d="M 0,0 C -40, -60 -10, -130 0, -155 C 10, -130 40, -60 0,0 Z" fill="url(#tealLeafGrad)" />
      <!-- Central vein -->
      <path d="M 0,0 L 0,-150" stroke="#1E4F70" stroke-width="2" opacity="0.6" stroke-linecap="round" fill="none" />
      <!-- Side veins -->
      <path d="M 0,-35 C -15,-45 -25,-52 -28,-54 M 0,-35 C 15,-45 25,-52 28,-54" stroke="#1E4F70" stroke-width="1.5" opacity="0.4" fill="none" />
      <path d="M 0,-70 C -18,-82 -28,-88 -30,-89 M 0,-70 C 18,-82 28,-88 30,-89" stroke="#1E4F70" stroke-width="1.5" opacity="0.4" fill="none" />
      <path d="M 0,-105 C -15,-118 -22,-121 -24,-122 M 0,-105 C 15,-118 22,-121 24,-122" stroke="#1E4F70" stroke-width="1.5" opacity="0.4" fill="none" />
      <!-- Water Droplet -->
      <circle cx="14" cy="-80" r="4" fill="#FFFFFF" opacity="0.35" />
      <circle cx="13" cy="-81" r="1.8" fill="#FFFFFF" opacity="0.7" />
    </g>

    <!-- MIDDLE TEAL LEAF (Vertical) -->
    <g transform="translate(200, 160)">
      <path d="M 0,0 C -45, -60 -10, -145 0, -170 C 10, -145 45, -60 0,0 Z" fill="url(#tealLeafGrad)" />
      <!-- Central vein -->
      <path d="M 0,0 L 0,-165" stroke="#1E4F70" stroke-width="2" opacity="0.6" stroke-linecap="round" fill="none" />
      <!-- Side veins -->
      <path d="M 0,-40 C -18,-50 -28,-58 -31,-60 M 0,-40 C 18,-50 28,-58 31,-60" stroke="#1E4F70" stroke-width="1.5" opacity="0.4" fill="none" />
      <path d="M 0,-80 C -20,-92 -31,-99 -34,-100 M 0,-80 C 20,-92 31,-99 34,-100" stroke="#1E4F70" stroke-width="1.5" opacity="0.4" fill="none" />
      <path d="M 0,-120 C -15,-132 -22,-135 -24,-136 M 0,-120 C 15,-132 22,-135 24,-136" stroke="#1E4F70" stroke-width="1.5" opacity="0.4" fill="none" />
      <!-- Water Droplet -->
      <circle cx="15" cy="-95" r="4.5" fill="#FFFFFF" opacity="0.35" />
      <circle cx="14" cy="-96" r="2" fill="#FFFFFF" opacity="0.7" />
    </g>
  </g>

  <!-- Group for the Diya Bowl & Flame -->
  <g id="diya_and_flame" filter="url(#dropShadow)" transform="translate(0, 10)">
    <!-- THE FLAME (3D styled layered flame) -->
    <g transform="translate(200, 130)">
      <!-- Outer Flame Glow -->
      <path d="M 0, -12 C -24, -30 -30, -75 0, -100 C 30, -75 24, -30 0, -12 Z" fill="url(#outerFlameGrad)" opacity="0.95" />
      
      <!-- Inner Flame -->
      <path d="M 0, -16 C -14, -28 -18, -58 0, -75 C 18, -58 14, -28 0, -16 Z" fill="url(#innerFlameGrad)" />
      
      <!-- Highlight core -->
      <path d="M 0, -22 C -6, -32 -8, -48 0, -58 C 8, -48 6, -32 0, -22 Z" fill="#FFFFFF" opacity="0.9" />
    </g>

    <!-- CLAY BOWL (DIYA) -->
    <!-- Base Foot -->
    <path d="M 165, 235 C 165, 252 235, 252 235, 235 Z" fill="#9A3412" />
    <path d="M 160, 235 L 240, 235 L 230, 246 L 170, 246 Z" fill="url(#diyaLipGrad)" opacity="0.9" />

    <!-- Main Bowl Base -->
    <path d="M 115, 175 C 115, 235 285, 235 285, 175 Z" fill="url(#diyaBowlGrad)" />

    <!-- Top Rim Rim Lip (giving thickness to the bowl) -->
    <ellipse cx="200" cy="175" rx="85" ry="16" fill="url(#diyaLipGrad)" stroke="#C2410C" stroke-width="1" />
    <ellipse cx="200" cy="175" rx="77" ry="12" fill="#7C2D12" />
  </g>
</svg>
